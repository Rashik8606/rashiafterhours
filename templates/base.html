<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{ title or site.brand + ' — Portfolio' }}</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
			darkMode: 'class',
			theme: {
				extend: {
					fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
					colors: {
						primary: { DEFAULT: '#7c3aed', soft: '#a78bfa' }
					}
				}
			}
		}
	</script>
	<link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
	<style>
		/* ── Nav pill highlight ── */
		.nav-link {
			position: relative;
			padding: 6px 14px;
			border-radius: 9999px;
			font-size: .875rem;
			font-weight: 500;
			transition: color .2s, background .2s, box-shadow .2s, transform .15s;
		}
		.nav-link:hover {
			background: rgba(124,58,237,.12);
			color: #7c3aed;
			box-shadow: 0 0 0 2px rgba(124,58,237,.18);
			transform: translateY(-1px);
		}
		.dark .nav-link:hover {
			background: rgba(167,139,250,.15);
			color: #a78bfa;
			box-shadow: 0 0 0 2px rgba(167,139,250,.22);
		}
		.nav-link.active {
			background: rgba(124,58,237,.15);
			color: #7c3aed;
			font-weight: 600;
		}
		.dark .nav-link.active {
			background: rgba(167,139,250,.2);
			color: #a78bfa;
		}

		/* ── Mobile nav links ── */
		.mob-link {
			display: block;
			padding: 10px 16px;
			border-radius: 12px;
			font-weight: 500;
			transition: background .2s, color .2s, padding-left .2s;
		}
		.mob-link:hover {
			background: rgba(124,58,237,.1);
			color: #7c3aed;
			padding-left: 22px;
		}
		.dark .mob-link:hover {
			background: rgba(167,139,250,.12);
			color: #a78bfa;
		}

		/* ── Cursor glow ── */
		#cursor-glow {
			width: 28px; height: 28px;
			background: radial-gradient(circle, rgba(124,58,237,.55) 0%, transparent 70%);
			border-radius: 50%;
			pointer-events: none;
			position: fixed;
			z-index: 9999;
			transform: translate(-50%,-50%);
			transition: width .15s, height .15s, opacity .2s;
			mix-blend-mode: screen;
		}
		a:hover ~ #cursor-glow,
		button:hover ~ #cursor-glow { width: 48px; height: 48px; }
	</style>
</head>
<body class="bg-white text-gray-900 dark:bg-gray-950 dark:text-gray-100 relative min-h-screen overflow-x-hidden">

	<div id="cursor-glow"></div>
	<canvas id="bg-canvas" class="fixed inset-0 -z-10 opacity-70"></canvas>

	<!-- ── Header ── -->
	<header class="sticky top-0 z-40 backdrop-blur supports-[backdrop-filter]:bg-white/70 dark:supports-[backdrop-filter]:bg-gray-900/60 bg-white/90 dark:bg-gray-950/80 border-b border-gray-100 dark:border-gray-800/60">
		<div class="container mx-auto px-6 py-3 flex items-center justify-between">

			<a href="#" class="text-xl font-extrabold tracking-tight flex-shrink-0">
				<span class="bg-gradient-to-r from-primary to-fuchsia-500 bg-clip-text text-transparent">
					&lt;{{ site.brand }} /&gt;
				</span>
			</a>

			<!-- Desktop nav -->
			<nav class="hidden md:flex items-center gap-1 text-sm font-medium">
				<a href="#about"      class="nav-link">About</a>
				<a href="#skills"     class="nav-link">Skills</a>
				<a href="#experience" class="nav-link">Experience</a>
				<a href="#projects"   class="nav-link">Projects</a>
				<a href="#services"   class="nav-link">Services</a>
				<a href="#faq"        class="nav-link">FAQ</a>
				<a href="#contact"    class="nav-link">Contact</a>
				<button id="themeToggle" title="Toggle theme"
					class="ml-2 w-9 h-9 rounded-full bg-gray-100 dark:bg-gray-800 hover:ring-2 ring-primary transition flex items-center justify-center text-base">
					<span id="themeIcon">🌙</span>
				</button>
			</nav>

			<!-- Mobile hamburger -->
			<button id="mobileMenuBtn" aria-expanded="false" aria-controls="mobileMenuPanel"
				class="md:hidden inline-flex items-center justify-center w-10 h-10 rounded-full bg-gray-100 dark:bg-gray-800 ring-1 ring-gray-200 dark:ring-gray-700 transition hover:ring-primary">
				<svg id="iconMenu"  xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
				<svg id="iconClose" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
			</button>
		</div>
	</header>

	<!-- Mobile overlay -->
	<div id="mobileOverlay" class="fixed inset-0 z-30 bg-black/30 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300"></div>

	<!-- Mobile drawer -->
	<nav id="mobileMenuPanel" class="fixed right-0 top-0 z-40 h-full w-72 max-w-[85%] translate-x-full transition-transform duration-300 bg-white dark:bg-gray-900 border-l border-gray-200 dark:border-gray-800 shadow-2xl">
		<div class="px-5 py-5 h-full flex flex-col">
			<div class="flex items-center justify-between mb-6">
				<span class="text-lg font-bold bg-gradient-to-r from-primary to-fuchsia-500 bg-clip-text text-transparent">Menu</span>
				<button id="mobileCloseBtn" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition" aria-label="Close">
					<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
				</button>
			</div>
			<div class="flex flex-col gap-1 flex-1">
				<a href="#about"      class="mob-link">About</a>
				<a href="#skills"     class="mob-link">Skills</a>
				<a href="#experience" class="mob-link">Experience</a>
				<a href="#projects"   class="mob-link">Projects</a>
				<a href="#services"   class="mob-link">Services</a>
				<a href="#faq"        class="mob-link">FAQ</a>
				<a href="#contact"    class="mob-link">Contact</a>
			</div>
			<div class="mt-6 pt-4 border-t border-gray-200 dark:border-gray-800">
				<button id="themeToggleMobile" class="w-full px-4 py-3 rounded-xl bg-gray-100 dark:bg-gray-800 text-sm font-medium hover:ring-2 ring-primary transition">
					🌙 Toggle Theme
				</button>
			</div>
		</div>
	</nav>

	<main>{% block content %}{% endblock %}</main>

	<footer class="container mx-auto px-6 py-12 text-sm text-gray-500">
		<div class="border-t border-gray-200 dark:border-gray-800 pt-8 flex flex-col sm:flex-row items-center justify-between gap-4">
			<p>© {{ current_year }} {{ site.brand }}. All rights reserved.</p>
			<div class="flex gap-4">
				<a class="hover:text-primary transition" href="{{ site.github }}"   target="_blank" rel="noreferrer">GitHub</a>
				<a class="hover:text-primary transition" href="{{ site.linkedin }}" target="_blank" rel="noreferrer">LinkedIn</a>
			</div>
		</div>
	</footer>

	<script src="{{ url_for('static', filename='js/main.js') }}"></script>
	<script>
		// ── Cursor glow ──────────────────────────────────────────────────────
		const glow = document.getElementById('cursor-glow');
		document.addEventListener('mousemove', e => {
			glow.style.left = e.clientX + 'px';
			glow.style.top  = e.clientY + 'px';
		});
		document.addEventListener('mouseenter', () => glow.style.opacity = '1');
		document.addEventListener('mouseleave', () => glow.style.opacity = '0');

		// ── Active nav on scroll ─────────────────────────────────────────────
		const sections = document.querySelectorAll('section[id]');
		const navLinks = document.querySelectorAll('.nav-link');
		const observer = new IntersectionObserver(entries => {
			entries.forEach(entry => {
				if (entry.isIntersecting) {
					navLinks.forEach(l => l.classList.remove('active'));
					const active = document.querySelector(`.nav-link[href="#${entry.target.id}"]`);
					if (active) active.classList.add('active');
				}
			});
		}, { rootMargin: '-40% 0px -50% 0px' });
		sections.forEach(s => observer.observe(s));

		// ── Theme icon sync ──────────────────────────────────────────────────
		function syncThemeIcon() {
			const icon = document.getElementById('themeIcon');
			if (icon) icon.textContent = document.documentElement.classList.contains('dark') ? '🌞' : '🌙';
		}
		syncThemeIcon();
		document.getElementById('themeToggle')?.addEventListener('click', syncThemeIcon);
	</script>
</body>
</html>
